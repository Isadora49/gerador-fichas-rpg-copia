<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editor de Fichas RPG v2.0</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #1a1a1a; color: white; }
        #toolbar { padding: 15px; background: #222; border-bottom: 2px solid #e74c3c; display: flex; gap: 15px; align-items: center; }
        #viewer-container { flex: 1; overflow: auto; position: relative; display: flex; justify-content: center; background: #333; }
        canvas { border: 1px solid #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; margin: 20px; }
        button { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        /* Marcador fixo */
        .marker { 
            position: absolute; 
            background: rgba(231, 76, 60, 0.4); 
            border: 2px solid #e74c3c;
            color: white; 
            font-size: 10px; 
            pointer-events: none; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Retângulo de seleção dinâmica */
        #selection-rect {
            position: absolute;
            border: 2px dashed #3498db;
            background: rgba(52, 152, 219, 0.3);
            pointer-events: none;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="file" id="uploadPdf" accept="application/pdf">
    <div id="status">Selecione um PDF</div>
    <button id="btnDownload" disabled>BAIXAR PDF CONFIGURADO</button>
    <small style="color: #bbb; margin-left: 10px;">Arraste o mouse no PDF para definir o tamanho do campo.</small>
</div>

<div id="viewer-container">
    <div id="selection-rect"></div>
    <canvas id="pdf-canvas"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
